<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Study Zone - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #2d3748;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; }
    .header .user { display: flex; align-items: center; gap: 15px; }
    .header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }
    .welcome {
      background: white;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .welcome h2 { color: #667eea; margin-bottom: 10px; }
    .assignments {
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .assignments h3 { margin-bottom: 20px; color: #495057; }
    .assignment-card {
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s;
    }
    .assignment-card:hover {
      border-color: #667eea;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.15);
    }
    .assignment-info h4 { color: #2d3748; margin-bottom: 5px; }
    .assignment-info p { color: #718096; font-size: 14px; }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .badge {
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }
    .badge-pending { background: #fff3cd; color: #856404; }
    .badge-completed { background: #d4edda; color: #155724; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #a0aec0;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎯 The Study Zone</h1>
    <div class="user">
      <span id="userName">Loading...</span>
      <button onclick="logout()">Sign Out</button>
    </div>
  </div>
  
  <div class="container">
    <div class="welcome">
      <h2 id="welcomeMsg">Welcome!</h2>
      <p>Your tutor has prepared personalized worksheets for you. Complete them to track your progress!</p>
    </div>
    
    <div class="assignments">
      <h3>📋 My Assignments</h3>
      <div id="assignmentsList">
        <div class="empty-state">Loading assignments...</div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      // 🔴 PASTE YOUR FIREBASE CONFIG HERE
      apiKey: "AIzaSyAk-zd9SFsvwEc45cehgZmyVPco6rxU5_4",
  authDomain: "tsz-learning-hub.firebaseapp.com",
  projectId: "tsz-learning-hub",
  storageBucket: "tsz-learning-hub.firebasestorage.app",
  messagingSenderId: "793215873084",
  appId: "1:793215873084:web:4b43c5f017bc888da01339"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    let studentData = null;
    
    // Check auth state
    auth.onAuthStateChanged(async user => {
      if (!user) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = user;
      await loadStudentData(user.uid);
      loadAssignments();
    });
    
    async function loadStudentData(uid) {
      const doc = await db.collection('students').doc(uid).get();
      if (doc.exists) {
        studentData = doc.data();
        document.getElementById('userName').textContent = studentData.name;
        document.getElementById('welcomeMsg').textContent = `Welcome, ${studentData.name}!`;
      }
    }
    
    async function loadAssignments() {
      if (!studentData) return;
      
      const snapshot = await db.collection('assignments')
        .where('studentId', '==', studentData.studentId)
        .orderBy('assignedDate', 'desc')
        .get();
      
      const container = document.getElementById('assignmentsList');
      
      if (snapshot.empty) {
        container.innerHTML = `
          <div class="empty-state">
            <p style="font-size: 48px; margin-bottom: 15px;">📚</p>
            <p>No assignments yet. Your tutor will send one soon!</p>
          </div>`;
        return;
      }
      
      container.innerHTML = snapshot.docs.map(doc => {
        const a = doc.data();
        const status = a.status || 'Assigned';
        const isCompleted = status === 'Completed';
        
        return `
          <div class="assignment-card">
            <div class="assignment-info">
              <h4>${a.worksheetTitle || 'Untitled Worksheet'}</h4>
              <p>${a.subject} • Grade ${a.grade} • Due: ${a.dueDate ? a.dueDate.toDate().toLocaleDateString() : 'No due date'}</p>
            </div>
            <div>
              <span class="badge badge-${isCompleted ? 'completed' : 'pending'}">${status}</span>
              ${!isCompleted ? `<a href="worksheet.html?id=${doc.id}" class="btn btn-primary" style="margin-left: 15px;">Start</a>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }
    
    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'index.html';
      });
    }
  </script>
</body>
</html>
