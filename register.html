<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Study Zone - Register</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .register-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 450px;
    }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      color: #4a5568;
      font-weight: 600;
      font-size: 14px;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-top: 10px;
    }
    .switch-text {
      text-align: center;
      margin-top: 20px;
      color: #718096;
      font-size: 14px;
    }
    .switch-text a { color: #667eea; text-decoration: none; font-weight: 600; }
    .error {
      background: #fed7d7;
      color: #c53030;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }
    .success {
      background: #c6f6d5;
      color: #22543d;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="register-card">
    <div class="logo">
      <h1>🎯 The Study Zone</h1>
      <p>Create your learning account</p>
    </div>
    
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    
    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="Emma Johnson" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="student@email.com" required>
      </div>
      <div class="form-group">
        <label>Parent/Guardian Email</label>
        <input type="email" id="parentEmail" placeholder="parent@email.com" required>
      </div>
      <div class="form-group">
        <label>Grade</label>
        <select id="grade" required>
          <option value="">Select Grade</option>
          <option value="1">Grade 1</option>
          <option value="2">Grade 2</option>
          <option value="3">Grade 3</option>
          <option value="4">Grade 4</option>
          <option value="5">Grade 5</option>
          <option value="6">Grade 6</option>
          <option value="7">Grade 7</option>
          <option value="8">Grade 8</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subjects (hold Ctrl to select multiple)</label>
        <select id="subjects" multiple style="height: 80px;">
          <option value="Mathematics" selected>Mathematics</option>
          <option value="Language">Language</option>
          <option value="Science and Technology">Science and Technology</option>
          <option value="STEAM">STEAM</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn">Create Account</button>
    </form>
    
    <div class="switch-text">
      Already have an account? <a href="index.html">Sign in</a>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      // 🔴 PASTE YOUR FIREBASE CONFIG HERE
      apiKey: "AIzaSyAk-zd9SFsvwEc45cehgZmyVPco6rxU5_4",
  authDomain: "tsz-learning-hub.firebaseapp.com",
  projectId: "tsz-learning-hub",
  storageBucket: "tsz-learning-hub.firebasestorage.app",
  messagingSenderId: "793215873084",
  appId: "1:793215873084:web:4b43c5f017bc888da01339"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value;
      const parentEmail = document.getElementById('parentEmail').value;
      const grade = document.getElementById('grade').value;
      const subjects = Array.from(document.getElementById('subjects').selectedOptions)
        .map(o => o.value).join(', ');
      
      try {
        // Create auth account
        const userCred = await auth.createUserWithEmailAndPassword(email, password);
        const uid = userCred.user.uid;
        
        // Save student data to Firestore
        await db.collection('students').doc(uid).set({
          studentId: 'STU-' + Date.now(),
          name: fullName,
          email: email,
          parentEmail: parentEmail,
          grade: parseInt(grade),
          subjects: subjects,
          assignedTutor: 'TUT-001',
          enrollmentDate: new Date(),
          status: 'Active',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        document.getElementById('successMsg').textContent = 
          '✅ Account created! Redirecting to login...';
        document.getElementById('successMsg').style.display = 'block';
        
        setTimeout(() => window.location.href = 'index.html', 2000);
        
      } catch (error) {
        document.getElementById('errorMsg').textContent = error.message;
        document.getElementById('errorMsg').style.display = 'block';
      }
    });
  </script>
</body>
</html>
